<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analisa Performa - Real-Time Dashboard</title>
    
    <meta name="theme-color" content="#1e40af">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

    <style>
        :root{
            --primary:#1e40af; --secondary:#2563eb; --bg:#f1f5f9; --card:#ffffff;
            --success:#10b981; --warning:#f59e0b; --danger:#ef4444;
            --radius:20px; --shadow:0 10px 30px rgba(30, 64, 175, 0.08);
        }
        body{margin:0;font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:#1e293b;padding-bottom:100px}
        
        .header{
            background:linear-gradient(135deg,var(--primary),var(--secondary));
            color:#fff;padding:50px 20px 80px;text-align:center;border-radius:0 0 40px 40px;
        }
        .header h2{font-weight:800;margin:0;font-size:22px;display:flex;align-items:center;justify-content:center;gap:10px}
        #liveClock{font-size:12px;opacity:.9;background:rgba(255,255,255,0.15);padding:6px 15px;border-radius:30px;display:inline-block;margin-top:10px}

        .container{max-width:1100px;margin:-50px auto 20px;padding:0 16px;display:grid;grid-gap:20px}
        
        .kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:15px}
        .kpi-card{
            background:var(--card);border-radius:var(--radius);padding:20px;
            display:flex;align-items:center;gap:15px;box-shadow:var(--shadow);
        }
        .kpi-icon{width:50px;height:50px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px}
        .kpi-info h3{margin:0;font-size:22px;font-weight:800}
        .kpi-info p{margin:0;color:#64748b;font-size:12px;font-weight:600}

        .card{background:var(--card);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow)}
        .card h4{margin-top:0;margin-bottom:15px;color:var(--primary);display:flex;align-items:center;gap:8px;font-size:16px}
        
        .table-wrap{overflow-x:auto}
        table{width:100%;border-collapse:collapse}
        th{text-align:left;padding:12px;font-size:11px;color:#94a3b8;text-transform:uppercase;border-bottom:2px solid #f1f5f9}
        td{padding:12px;border-bottom:1px solid #f1f5f9;font-size:13px}
        
        .user-id{background:#eff6ff;color:var(--primary);padding:3px 8px;border-radius:6px;font-weight:700;font-size:11px}
        
        .filter-group{display:flex;gap:10px;margin-bottom:15px}
        .filter-group input, .filter-group select {
            flex:1; padding:10px; border-radius:10px; border:1px solid #e2e8f0; font-family:inherit; font-size:13px;
        }

        .btn-export{
            width:100%; padding:12px; border:none; border-radius:12px; background:var(--primary);
            color:#fff; font-weight:700; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; margin-top:10px;
        }

        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; display: flex; justify-content: space-around; padding: 12px 0; box-shadow: 0 -5px 20px rgba(0,0,0,0.05); border-radius: 25px 25px 0 0; z-index: 1000; }
        .bottom-nav a { text-decoration: none; color: #94a3b8; font-size: 11px; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .bottom-nav a.active { color: var(--primary); font-weight: 700; }
    </style>
</head>
<body>

<div class="header">
    <h2><i class="fas fa-chart-line"></i> DASHBOARD ANALITIK</h2>
    <div id="liveClock">Memuat waktu...</div>
</div>

<div class="container">
    <div class="kpi-grid">
        <div class="kpi-card">
            <div class="kpi-icon" style="background:#eff6ff;color:var(--primary)"><i class="fas fa-user-group"></i></div>
            <div class="kpi-info"><h3 id="totalWorker">0</h3><p>Total Database</p></div>
        </div>
        <div class="kpi-card">
            <div class="kpi-icon" style="background:#ecfdf5;color:var(--success)"><i class="fas fa-calendar-check"></i></div>
            <div class="kpi-info"><h3 id="totalHadir">0</h3><p>Hadir Hari Ini</p></div>
        </div>
        <div class="kpi-card">
            <div class="kpi-icon" style="background:#fef3c7;color:var(--warning)"><i class="fas fa-percent"></i></div>
            <div class="kpi-info"><h3 id="attendancePercent">0%</h3><p>Rate Kehadiran</p></div>
        </div>
    </div>

    <div class="card">
        <h4><i class="fas fa-chart-area"></i> Trend Kehadiran (30 Hari Terakhir)</h4>
        <canvas id="trendChart" height="150"></canvas>
    </div>

    <div class="card">
        <h4><i class="fas fa-trophy"></i> Top 10 Worker Teraktif</h4>
        <canvas id="topWorkerChart" height="150"></canvas>
    </div>

    <div class="card">
        <h4><i class="fas fa-search"></i> Analisa Detail Per Worker</h4>
        <div class="filter-group">
            <input type="text" id="filterName" placeholder="Cari nama...">
            <select id="filterStatus">
                <option value="">Semua Status</option>
                <option value="DW Reguler">DW Reguler</option>
                <option value="DW Kontrak">DW Kontrak</option>
                <option value="DW Freelance">DW Freelance</option>
            </select>
        </div>
        <div class="table-wrap" id="analisaTable"></div>
        <button class="btn-export" onclick="exportAnalisaExcel()">
            <i class="fas fa-file-excel"></i> Download Laporan Analisa (.xlsx)
        </button>
    </div>
</div>

<div class="bottom-nav">
    <a href="index.html"><i class="fas fa-home"></i><span>Home</span></a>
    <a href="data_dw.html"><i class="fas fa-users"></i><span>Worker</span></a>
    <a href="absen.html"><i class="fas fa-qrcode"></i><span>Scan</span></a>
    <a href="analisa.html" class="active"><i class="fas fa-chart-bar"></i><span>Analisa</span></a>
</div>



<script>
let db, workers=[], absensi=[];
let trendChartObj, topWorkerChartObj;

// 1. Inisialisasi Jam
function updateTime(){
    document.getElementById('liveClock').innerText = new Date().toLocaleString('id-ID',{weekday:'long',day:'numeric',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit',second:'2-digit'});
}
setInterval(updateTime,1000); updateTime();

// 2. Akses Database
const req = indexedDB.open("absensiDB", 1);
req.onsuccess = e => {
    db = e.target.result;
    fetchAndRender();
    // Auto-update UI jika ada perubahan data (Polling)
    setInterval(fetchAndRender, 5000); 
};

function fetchAndRender() {
    const tx = db.transaction(["workers", "absensi"], "readonly");
    tx.objectStore("workers").getAll().onsuccess = e => { workers = e.target.result || []; checkComplete(); };
    tx.objectStore("absensi").getAll().onsuccess = e => { absensi = e.target.result || []; checkComplete(); };
}

let loaded = 0;
function checkComplete() {
    loaded++;
    if(loaded >= 2) {
        updateUI();
        loaded = 0;
    }
}

// 3. UI Update Logic
function updateUI() {
    const today = new Date().toISOString().split('T')[0];
    const hadirToday = absensi.filter(a => a.tanggal === today).length;
    const rate = workers.length ? Math.round((hadirToday/workers.length)*100) : 0;

    document.getElementById('totalWorker').innerText = workers.length;
    document.getElementById('totalHadir').innerText = hadirToday;
    document.getElementById('attendancePercent').innerText = rate + '%';

    renderTrendChart();
    renderTopWorkerChart();
    renderAnalisaTable();
}

// 4. Charting
function renderTrendChart() {
    if(trendChartObj) trendChartObj.destroy();
    
    const dates = [];
    const counts = [];
    for(let i=29; i>=0; i--) {
        const d = new Date();
        d.setDate(d.getDate() - i);
        const ds = d.toISOString().split('T')[0];
        dates.push(ds.split('-').slice(1).reverse().join('/')); // Format DD/MM
        counts.push(absensi.filter(a => a.tanggal === ds).length);
    }

    trendChartObj = new Chart(document.getElementById('trendChart'), {
        type: 'line',
        data: {
            labels: dates,
            datasets: [{
                label: 'Kehadiran',
                data: counts,
                borderColor: '#2563eb',
                backgroundColor: 'rgba(37, 99, 235, 0.1)',
                fill: true,
                tension: 0.4,
                pointRadius: 2
            }]
        },
        options: {
            responsive: true,
            plugins: { legend: { display: false } },
            scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } }
        }
    });
}

function renderTopWorkerChart() {
    if(topWorkerChartObj) topWorkerChartObj.destroy();
    
    const stats = {};
    absensi.forEach(a => { stats[a.nama] = (stats[a.nama] || 0) + 1; });
    
    const sorted = Object.entries(stats).sort((a,b) => b[1] - a[1]).slice(0, 10);

    topWorkerChartObj = new Chart(document.getElementById('topWorkerChart'), {
        type: 'bar',
        data: {
            labels: sorted.map(x => x[0]),
            datasets: [{
                label: 'Total Hadir',
                data: sorted.map(x => x[1]),
                backgroundColor: '#10b981',
                borderRadius: 5
            }]
        },
        options: {
            indexAxis: 'y',
            responsive: true,
            plugins: { legend: { display: false } }
        }
    });
}

// 5. Analisa Table & Excel
function renderAnalisaTable() {
    const qName = document.getElementById('filterName').value.toLowerCase();
    const qStatus = document.getElementById('filterStatus').value;

    const data = workers.map(w => {
        return {
            id: w.id,
            nama: w.nama,
            status: w.status,
            total: absensi.filter(a => a.id_dw === w.id).length
        }
    }).filter(x => x.nama.toLowerCase().includes(qName) && (!qStatus || x.status === qStatus))
      .sort((a,b) => b.total - a.total);

    let html = `<table><thead><tr><th>Worker</th><th>Kehadiran</th></tr></thead><tbody>`;
    data.forEach(x => {
        html += `<tr>
            <td><span class="user-id">${x.id}</span> <b>${x.nama}</b><br><small>${x.status}</small></td>
            <td><strong style="color:var(--primary)">${x.total} Hari</strong></td>
        </tr>`;
    });
    document.getElementById('analisaTable').innerHTML = html + `</tbody></table>`;
}

function exportAnalisaExcel() {
    const dataForExport = workers.map(w => ({
        "ID WORKER": w.id,
        "NAMA LENGKAP": w.nama,
        "STATUS": w.status,
        "TOTAL HADIR": absensi.filter(a => a.id_dw === w.id).length,
        "ALAMAT": w.alamat || "-"
    })).sort((a,b) => b["TOTAL HADIR"] - a["TOTAL HADIR"]);

    const ws = XLSX.utils.json_to_sheet(dataForExport);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Analisa");
    XLSX.writeFile(wb, `Analisa_Performa_${new Date().toISOString().split('T')[0]}.xlsx`);
}

// Filter Listeners
document.getElementById('filterName').addEventListener('input', renderAnalisaTable);
document.getElementById('filterStatus').addEventListener('change', renderAnalisaTable);
</script>
</body>
</html>
